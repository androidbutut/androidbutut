<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VIRA CMS Produk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    /* Optional: Styling for loading overlay */
    .loading-overlay {
        position: fixed; /* Use fixed to cover entire viewport */
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 1.5rem;
        z-index: 1000;
        pointer-events: none; /* Allows clicks to pass through if not visible */
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
    }
    .loading-overlay.active {
        opacity: 1;
        pointer-events: all; /* Blocks clicks when active */
    }
    .card-img-top {
        height: 180px; /* Fixed height for product images */
        object-fit: cover; /* Ensures image covers the area */
    }
  </style>
</head>
<body class="bg-dark text-light p-4">
  <div class="loading-overlay" id="loadingOverlay">
    Memproses...
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">🛠️ VIRA - CMS Produk Toko</h1>
    <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
  </div>
    
  <form id="produk-form" class="mb-5 p-3 border rounded border-secondary">
    <h4 class="mb-3">Tambah/Edit Produk</h4>
    <div class="mb-3">
      <label for="slug" class="form-label">Slug Produk (ID Unik):</label>
      <input type="text" id="slug" class="form-control bg-secondary text-white border-dark" placeholder="contoh-nama-produk" required />
      <div class="form-text text-muted">Akan menjadi ID unik produk di database. Tidak bisa diubah setelah disimpan.</div>
    </div>
    <div class="mb-3">
      <label for="nama" class="form-label">Nama Produk:</label>
      <input type="text" id="nama" class="form-control bg-secondary text-white border-dark" placeholder="Nama lengkap produk" required />
    </div>
    <div class="mb-3">
      <label for="harga" class="form-label">Harga (IDR):</label>
      <input type="number" id="harga" class="form-control bg-secondary text-white border-dark" placeholder="Contoh: 150000" required />
    </div>
    <div class="mb-3">
      <label for="gambar" class="form-label">URL Gambar Produk:</label>
      <input type="url" id="gambar" class="form-control bg-secondary text-white border-dark" placeholder="https://example.com/gambar.jpg" />
    </div>
    <div class="mb-3">
      <label for="link" class="form-label">Link Pembelian (Tokomu, Shopee, dll):</label>
      <input type="url" id="link" class="form-control bg-secondary text-white border-dark" placeholder="https://shopee.co.id/produk-ini" />
    </div>
    <div class="mb-3">
      <label for="tags" class="form-label">Tag Produk (Pisahkan dengan koma):</label>
      <input type="text" id="tags" class="form-control bg-secondary text-white border-dark" placeholder="contoh: sepatu, murah, fashion, pria" />
      <div class="form-text text-muted">Digunakan untuk pencarian di VIRA.</div>
    </div>
    <div class="mb-4">
      <label for="deskripsi" class="form-label">Deskripsi Singkat:</label>
      <textarea id="deskripsi" class="form-control bg-secondary text-white border-dark" rows="3" placeholder="Deskripsi singkat tentang produk ini"></textarea>
    </div>
    <button class="btn btn-success w-100" type="submit">💾 Simpan Produk</button>
  </form>

  <h4 class="mb-3">Daftar Produk</h4>
  <div id="produk-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-2">
    <div class="col-12 text-center text-muted" id="initial-loading-message">
        Memuat daftar produk...
    </div>
  </div>

  <script type="module" src="./admin.js"></script>
</body>
</html>
